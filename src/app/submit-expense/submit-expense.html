<mat-toolbar>
    <span>Submit an Expense</span>
</mat-toolbar>

<div class="column-layout">
    <mat-form-field>
        <mat-label>Amount</mat-label>
        <input matInput [formField]="expenseForm.amountDollars" type="number" />
        <span matTextPrefix>$&nbsp;</span>
    </mat-form-field>

    <mat-form-field>
        <mat-label>Amount</mat-label>
        <input matInput [formField]="expenseForm.amountCents" type="number" />
        <span matTextPrefix>$&nbsp;</span>
    </mat-form-field>

    <mat-form-field>
        <mat-label>Date</mat-label>
        <input matInput [formField]="expenseForm.date" type="date" />
    </mat-form-field>

    <mat-form-field>
        <mat-label>Description</mat-label>
        <input matInput [formField]="expenseForm.description" />
    </mat-form-field>
</div>
